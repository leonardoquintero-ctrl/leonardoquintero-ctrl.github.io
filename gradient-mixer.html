<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient Mixer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e3e;
      --text: #e8e8f0;
      --text-muted: #7a7a9a;
      --accent: #7c6ef5;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }

    header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }

    .badge {
      font-size: 11px;
      background: var(--accent);
      padding: 2px 8px;
      border-radius: 20px;
      opacity: 0.85;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      height: calc(100vh - 57px);
      overflow: hidden;
    }

    .panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .tabs {
      display: flex;
      background: var(--surface2);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }

    .tab {
      flex: 1;
      padding: 7px;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-muted);
      border: none;
      background: transparent;
    }

    .tab.active { background: var(--accent); color: #fff; }

    .angle-row { display: flex; align-items: center; gap: 12px; }
    .angle-row input[type=range] { flex: 1; accent-color: var(--accent); cursor: pointer; }

    .angle-value {
      font-size: 13px;
      font-weight: 600;
      width: 42px;
      text-align: right;
      color: var(--accent);
    }

    .angle-dial {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--border);
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      background: var(--surface2);
    }

    .angle-needle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 2px;
      height: 40%;
      background: var(--accent);
      transform-origin: bottom center;
      transform: translateX(-50%) rotate(0deg);
      border-radius: 2px;
    }

    .stops-list { display: flex; flex-direction: column; gap: 8px; }

    .stop-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border-radius: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      transition: border-color 0.15s;
    }

    .stop-item:hover { border-color: var(--accent); }

    .stop-swatch {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      overflow: hidden;
      padding: 0;
      background: none;
      flex-shrink: 0;
      position: relative;
    }

    .stop-swatch input[type=color] {
      position: absolute;
      inset: -4px;
      width: calc(100% + 8px);
      height: calc(100% + 8px);
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
    }

    .stop-hex {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 8px;
      color: var(--text);
      font-size: 13px;
      font-family: monospace;
      width: 90px;
      transition: border-color 0.15s;
    }

    .stop-hex:focus { outline: none; border-color: var(--accent); }

    .stop-pos {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 8px;
      color: var(--text);
      font-size: 13px;
      width: 54px;
      text-align: center;
      font-family: monospace;
    }

    .stop-pos:focus { outline: none; border-color: var(--accent); }

    .stop-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .stop-remove:hover { color: #f06292; }

    .btn-add {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }

    .btn-add:hover { border-color: var(--accent); color: var(--accent); }

    .presets-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .preset {
      height: 44px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
    }

    .preset:hover { transform: scale(1.06); border-color: #fff3; }

    .opacity-row { display: flex; align-items: center; gap: 12px; }
    .opacity-row input[type=range] { flex: 1; accent-color: var(--accent); cursor: pointer; }

    .main { display: flex; flex-direction: column; overflow: hidden; }

    .preview-area {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .preview-canvas { position: absolute; inset: 0; transition: opacity 0.2s; }

    .preview-shapes {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 32px;
    }

    .shape-row { display: flex; gap: 24px; align-items: center; }

    .mock-logo {
      width: 160px; height: 60px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
      color: #fff; text-shadow: 0 1px 8px rgba(0,0,0,0.4);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }

    .mock-circle {
      width: 80px; height: 80px; border-radius: 50%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }

    .mock-pill {
      width: 120px; height: 44px; border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }

    .mock-card {
      width: 220px; height: 130px; border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      padding: 20px; display: flex; flex-direction: column; justify-content: flex-end;
    }

    .mock-card-title { font-size: 16px; font-weight: 700; color: #fff; text-shadow: 0 1px 6px rgba(0,0,0,0.4); }
    .mock-card-sub { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 2px; }

    .mock-text-bg {
      width: 340px; height: 70px; border-radius: 10px;
      display: flex; align-items: center; padding: 0 20px;
      font-size: 24px; font-weight: 800; color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4); letter-spacing: -0.5px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }

    .code-panel {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .code-tabs { display: flex; gap: 4px; }

    .code-tab {
      font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 5px;
      border: none; cursor: pointer;
      background: var(--surface2); color: var(--text-muted);
      transition: all 0.15s;
    }

    .code-tab.active { background: var(--accent); color: #fff; }

    .code-output-row { display: flex; gap: 10px; align-items: stretch; }

    .code-output {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Consolas', monospace;
      font-size: 12px;
      color: #a8d8a8;
      word-break: break-all;
      min-height: 40px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .btn-copy {
      padding: 8px 16px;
      background: var(--accent);
      border: none; border-radius: 8px;
      color: #fff; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s; white-space: nowrap;
    }

    .btn-copy:hover { opacity: 0.85; }
    .btn-copy.copied { background: #4caf84; }

    .gradient-bar-wrap {
      position: relative; height: 28px; border-radius: 14px;
      overflow: hidden; cursor: pointer;
      border: 1px solid var(--border); margin: 4px 0;
    }

    .gradient-bar { position: absolute; inset: 0; border-radius: 14px; }

    .stop-handle {
      position: absolute; top: 50%;
      transform: translate(-50%, -50%);
      width: 18px; height: 18px; border-radius: 50%;
      border: 2.5px solid #fff;
      box-shadow: 0 1px 6px rgba(0,0,0,0.5);
      cursor: grab; transition: transform 0.1s; z-index: 2;
    }

    .stop-handle:hover,
    .stop-handle.dragging { transform: translate(-50%, -50%) scale(1.2); }

    .panel::-webkit-scrollbar { width: 4px; }
    .panel::-webkit-scrollbar-track { background: transparent; }
    .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>
<nav>
    
<header>
  <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
    <defs>
      <linearGradient id="hg" x1="0" y1="0" x2="22" y2="22" gradientUnits="userSpaceOnUse">
        <stop stop-color="#7c6ef5"/>
        <stop offset="1" stop-color="#f06292"/>
      </linearGradient>
    </defs>
    <circle cx="11" cy="11" r="10" fill="url(#hg)" opacity="0.9"/>
    <circle cx="7" cy="11" r="3" fill="white" opacity="0.9"/>
    <circle cx="15" cy="11" r="3" fill="white" opacity="0.9"/>
    <ellipse cx="11" cy="11" rx="2" ry="5" fill="white" opacity="0.6"/>
  </svg>
  <h1>Gradient Mixer</h1>
  <span class="badge">Design Tool</span>
  <div class="nav-links">
        <a href="/index.html">Back</a>
  </div>
</header>

<div class="layout">

  <div class="panel">

    <div>
      <div class="section-title">Gradient Type</div>
      <div class="tabs">
        <button class="tab active" onclick="setType('linear')">Linear</button>
        <button class="tab" onclick="setType('radial')">Radial</button>
        <button class="tab" onclick="setType('conic')">Conic</button>
      </div>
    </div>

    <div id="angle-section">
      <div class="section-title">Direction</div>
      <div class="angle-row">
        <div class="angle-dial" id="angleDial">
          <div class="angle-needle" id="angleNeedle"></div>
        </div>
        <input type="range" id="angleSlider" min="0" max="360" value="135"
               oninput="setAngle(this.value)">
        <div class="angle-value" id="angleLabel">135°</div>
      </div>
    </div>

    <div>
      <div class="section-title">Gradient Bar</div>
      <div class="gradient-bar-wrap" id="gradientBar" onclick="barClick(event)">
        <div class="gradient-bar" id="gradientBarBg"></div>
      </div>
    </div>

    <div>
      <div class="section-title">Color Stops</div>
      <div class="stops-list" id="stopsList"></div>
      <button class="btn-add" onclick="addStop()" style="margin-top:8px">
        <span style="font-size:18px;line-height:1">+</span> Add Stop
      </button>
    </div>

    <div>
      <div class="section-title">Overall Opacity</div>
      <div class="opacity-row">
        <input type="range" id="opacitySlider" min="0" max="100" value="100"
               oninput="setOpacity(this.value)">
        <div class="angle-value" id="opacityLabel">100%</div>
      </div>
    </div>

    <div>
      <div class="section-title">Presets</div>
      <div class="presets-grid" id="presetsGrid"></div>
    </div>

  </div>

  <div class="main">

    <div class="preview-area">
      <div class="preview-canvas" id="previewCanvas"></div>
      <div class="preview-shapes">

        <div class="shape-row">
          <div class="mock-logo grad-apply">Brand</div>
          <div class="mock-circle grad-apply"></div>
          <div class="mock-pill grad-apply">Get Started</div>
        </div>

        <div class="shape-row">
          <div class="mock-card grad-apply">
            <div class="mock-card-title">Dashboard</div>
            <div class="mock-card-sub">Analytics overview</div>
          </div>
          <div class="mock-text-bg grad-apply">Hello World</div>
        </div>

      </div>
    </div>

    <div class="code-panel">
      <div class="code-tabs">
        <button class="code-tab active" onclick="setCodeTab('css')">CSS</button>
        <button class="code-tab" onclick="setCodeTab('bg')">background</button>
        <button class="code-tab" onclick="setCodeTab('tailwind')">Tailwind</button>
        <button class="code-tab" onclick="setCodeTab('figma')">Colors</button>
      </div>
      <div class="code-output-row">
        <div class="code-output" id="codeOutput"></div>
        <button class="btn-copy" id="copyBtn" onclick="copyCode()">Copy</button>
      </div>
    </div>

  </div>
</div>

<script>
  const state = {
    type: 'linear',
    angle: 135,
    opacity: 100,
    stops: [
      { color: '#7c6ef5', pos: 0 },
      { color: '#f06292', pos: 100 },
    ],
    codeTab: 'css',
  };

  const PRESETS = [
    [{ color: '#7c6ef5', pos: 0 }, { color: '#f06292', pos: 100 }],
    [{ color: '#00c6ff', pos: 0 }, { color: '#0072ff', pos: 100 }],
    [{ color: '#f7971e', pos: 0 }, { color: '#ffd200', pos: 100 }],
    [{ color: '#11998e', pos: 0 }, { color: '#38ef7d', pos: 100 }],
    [{ color: '#fc5c7d', pos: 0 }, { color: '#6a3093', pos: 100 }],
    [{ color: '#4facfe', pos: 0 }, { color: '#00f2fe', pos: 100 }],
    [{ color: '#fa709a', pos: 0 }, { color: '#fee140', pos: 100 }],
    [{ color: '#30cfd0', pos: 0 }, { color: '#330867', pos: 100 }],
    [{ color: '#a18cd1', pos: 0 }, { color: '#fbc2eb', pos: 100 }],
    [{ color: '#ffecd2', pos: 0 }, { color: '#fcb69f', pos: 100 }],
    [{ color: '#2af598', pos: 0 }, { color: '#009efd', pos: 100 }],
    [{ color: '#ff9a9e', pos: 0 }, { color: '#fad0c4', pos: 50 }, { color: '#ffecd2', pos: 100 }],
    [{ color: '#43e97b', pos: 0 }, { color: '#38f9d7', pos: 100 }],
    [{ color: '#667eea', pos: 0 }, { color: '#764ba2', pos: 100 }],
    [{ color: '#f093fb', pos: 0 }, { color: '#f5576c', pos: 100 }],
    [{ color: '#4e54c8', pos: 0 }, { color: '#8f94fb', pos: 100 }],
  ];

  function buildGradientValue() {
    const sorted = [...state.stops].sort((a, b) => a.pos - b.pos);
    const stopsStr = sorted.map(s => `${s.color} ${s.pos}%`).join(', ');
    if (state.type === 'linear') return `linear-gradient(${state.angle}deg, ${stopsStr})`;
    if (state.type === 'radial') return `radial-gradient(circle, ${stopsStr})`;
    return `conic-gradient(from ${state.angle}deg, ${stopsStr})`;
  }

  function buildCode() {
    const grad = buildGradientValue();
    if (state.codeTab === 'css') {
      return `background: ${grad};${state.opacity < 100 ? `\nopacity: ${(state.opacity / 100).toFixed(2)};` : ''}`;
    }
    if (state.codeTab === 'bg') return grad;
    if (state.codeTab === 'tailwind') {
      return `/* tailwind.config.js */\nbackgroundImage: {\n  'custom-gradient': '${grad}'\n}`;
    }
    return [...state.stops]
      .sort((a, b) => a.pos - b.pos)
      .map(s => `${s.color}  ${s.pos}%`)
      .join('\n');
  }

  function render() {
    const grad = buildGradientValue();
    const op = state.opacity < 100 ? String(state.opacity / 100) : '';

    document.getElementById('previewCanvas').style.cssText =
      `background: ${grad};${op ? ` opacity: ${op};` : ''}`;

    document.querySelectorAll('.grad-apply').forEach(el => {
      el.style.background = grad;
      el.style.opacity = op || '';
    });

    const sorted = [...state.stops].sort((a, b) => a.pos - b.pos);
    document.getElementById('gradientBarBg').style.background =
      `linear-gradient(90deg, ${sorted.map(s => `${s.color} ${s.pos}%`).join(', ')})`;

    const bar = document.getElementById('gradientBar');
    bar.querySelectorAll('.stop-handle').forEach(h => h.remove());
    sorted.forEach(stop => {
      const realIdx = state.stops.indexOf(stop);
      const h = document.createElement('div');
      h.className = 'stop-handle';
      h.style.left = stop.pos + '%';
      h.style.background = stop.color;
      h.dataset.idx = realIdx;
      setupHandleDrag(h);
      bar.appendChild(h);
    });

    renderStopsList();

    document.getElementById('angleNeedle').style.transform =
      `translateX(-50%) rotate(${state.angle}deg)`;
    document.getElementById('angle-section').style.display =
      state.type === 'radial' ? 'none' : '';

    document.getElementById('codeOutput').textContent = buildCode();
  }

  function renderStopsList() {
    const list = document.getElementById('stopsList');
    list.innerHTML = '';
    [...state.stops]
      .map((s, i) => ({ ...s, _i: i }))
      .sort((a, b) => a.pos - b.pos)
      .forEach(({ color, pos, _i }) => {
        const div = document.createElement('div');
        div.className = 'stop-item';
        div.innerHTML = `
          <div class="stop-swatch" style="background:${color}">
            <input type="color" value="${color}" data-idx="${_i}" onchange="stopColorChange(this)">
          </div>
          <input class="stop-hex" type="text" value="${color}" data-idx="${_i}"
                 oninput="stopHexInput(this)" onblur="stopHexBlur(this)" maxlength="7">
          <input class="stop-pos" type="number" value="${pos}" min="0" max="100" data-idx="${_i}"
                 oninput="stopPosChange(this)">
          <span style="font-size:10px;color:var(--text-muted)">%</span>
          <button class="stop-remove" data-idx="${_i}" onclick="removeStop(this.dataset.idx)"
                  title="Remove stop">×</button>
        `;
        list.appendChild(div);
      });
  }

  function setType(t) {
    state.type = t;
    document.querySelectorAll('.tab').forEach(b =>
      b.classList.toggle('active', b.textContent.toLowerCase() === t));
    render();
  }

  function setAngle(v) {
    state.angle = parseInt(v);
    document.getElementById('angleSlider').value = v;
    document.getElementById('angleLabel').textContent = v + '°';
    render();
  }

  function setOpacity(v) {
    state.opacity = parseInt(v);
    document.getElementById('opacityLabel').textContent = v + '%';
    render();
  }

  function addStop() {
    const mid = state.stops.length >= 2
      ? Math.round((state.stops[0].pos + state.stops[state.stops.length - 1].pos) / 2)
      : 50;
    state.stops.push({ color: '#ffffff', pos: mid });
    render();
  }

  function removeStop(idx) {
    if (state.stops.length <= 2) return;
    state.stops.splice(parseInt(idx), 1);
    render();
  }

  function stopColorChange(input) {
    state.stops[parseInt(input.dataset.idx)].color = input.value;
    render();
  }

  function stopHexInput(input) {
    if (/^#[0-9a-fA-F]{6}$/.test(input.value)) {
      state.stops[parseInt(input.dataset.idx)].color = input.value;
      render();
    }
  }

  function stopHexBlur(input) {
    input.value = state.stops[parseInt(input.dataset.idx)].color;
  }

  function stopPosChange(input) {
    const v = parseInt(input.value);
    if (!isNaN(v)) {
      state.stops[parseInt(input.dataset.idx)].pos = Math.max(0, Math.min(100, v));
      render();
    }
  }

  function barClick(e) {
    if (e.target.classList.contains('stop-handle')) return;
    const bar = document.getElementById('gradientBar');
    const rect = bar.getBoundingClientRect();
    const pct = Math.round((e.clientX - rect.left) / rect.width * 100);
    state.stops.push({ color: interpolateColor(pct), pos: pct });
    render();
  }

  function interpolateColor(pct) {
    const sorted = [...state.stops].sort((a, b) => a.pos - b.pos);
    if (pct <= sorted[0].pos) return sorted[0].color;
    if (pct >= sorted[sorted.length - 1].pos) return sorted[sorted.length - 1].color;
    for (let i = 0; i < sorted.length - 1; i++) {
      const a = sorted[i], b = sorted[i + 1];
      if (pct >= a.pos && pct <= b.pos) {
        return mixHex(a.color, b.color, (pct - a.pos) / (b.pos - a.pos));
      }
    }
    return '#888888';
  }

  function mixHex(c1, c2, t) {
    const p = c => [
      parseInt(c.slice(1,3), 16),
      parseInt(c.slice(3,5), 16),
      parseInt(c.slice(5,7), 16),
    ];
    const [r1,g1,b1] = p(c1), [r2,g2,b2] = p(c2);
    const m = (a, b) => Math.round(a + (b - a) * t).toString(16).padStart(2, '0');
    return `#${m(r1,r2)}${m(g1,g2)}${m(b1,b2)}`;
  }

  function setupHandleDrag(handle) {
    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      e.stopPropagation();
      handle.classList.add('dragging');
      const bar = document.getElementById('gradientBar');
      const rect = bar.getBoundingClientRect();
      const idx = parseInt(handle.dataset.idx);

      function onMove(ev) {
        const pct = Math.max(0, Math.min(100, Math.round((ev.clientX - rect.left) / rect.width * 100)));
        state.stops[idx].pos = pct;
        render();
      }

      function onUp() {
        handle.classList.remove('dragging');
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      }

      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });
  }

  document.getElementById('angleDial').addEventListener('mousedown', e => {
    const rect = document.getElementById('angleDial').getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    function update(ev) {
      let angle = Math.round(Math.atan2(ev.clientX - cx, -(ev.clientY - cy)) * 180 / Math.PI);
      if (angle < 0) angle += 360;
      setAngle(angle);
    }

    update(e);
    window.addEventListener('mousemove', update);
    window.addEventListener('mouseup', () => window.removeEventListener('mousemove', update), { once: true });
  });

  function setCodeTab(t) {
    state.codeTab = t;
    document.querySelectorAll('.code-tab').forEach(b => {
      const label = b.textContent.toLowerCase();
      b.classList.toggle('active',
        label === t ||
        (t === 'bg' && label === 'background') ||
        (t === 'figma' && label === 'colors'));
    });
    render();
  }

  function copyCode() {
    navigator.clipboard.writeText(document.getElementById('codeOutput').textContent).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
    });
  }

  function buildPresets() {
    const grid = document.getElementById('presetsGrid');
    PRESETS.forEach(stops => {
      const sorted = [...stops].sort((a, b) => a.pos - b.pos);
      const div = document.createElement('div');
      div.className = 'preset';
      div.style.background = `linear-gradient(135deg, ${sorted.map(s => `${s.color} ${s.pos}%`).join(', ')})`;
      div.title = 'Apply preset';
      div.onclick = () => { state.stops = stops.map(s => ({ ...s })); render(); };
      grid.appendChild(div);
    });
  }

  buildPresets();
  render();
</script>
</body>
</html>
